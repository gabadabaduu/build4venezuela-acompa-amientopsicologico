<nav class="navbar">
  <span class="brand">PsicologíaApoyo</span>
  <div class="nav-links">
    @if (auth.isAuthenticated()) {
      <a routerLink="/dashboard">Panel</a>
      <a routerLink="/resources">Recursos</a>
      <a routerLink="/profile">Perfil</a>
      <button class="btn-logout" (click)="auth.signOut()">Salir</button>
    } @else {
      <a routerLink="/login">Ingresar</a>
      <a routerLink="/register">Registrarse</a>
    }
  </div>
</nav>

@if (auth.isLoading()) {
  <div class="loading">Cargando...</div>
} @else {
  <main>
    <router-outlet />
  </main>
}
