<div class="page">
  <h1>Registro</h1>

  <form (ngSubmit)="onSubmit()" class="form">
    <label>
      Nombre completo
      <input type="text" [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" name="fullName" required />
    </label>

    <label>
      Correo electrónico
      <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
    </label>

    <label>
      Contraseña
      <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required />
    </label>

    <label>
      Rol
      <select [ngModel]="role()" (ngModelChange)="role.set($event)" name="role">
        <option value="patient">Paciente</option>
        <option value="psychologist">Psicólogo/a</option>
      </select>
    </label>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Registrando...' : 'Registrarse' }}
    </button>
  </form>

  <p class="link">
    ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
