<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-badge">PA</div>
      <div>
        <h1>{{ mode() === 'login' ? 'Iniciar sesión' : 'Cambiar contraseña' }}</h1>
        <p>
          @if (mode() === 'login') {
            Bienvenido de nuevo
          } @else {
            Usa tu contraseña temporal o actual para elegir una nueva
          }
        </p>
      </div>
    </div>

    <div class="auth-tabs" role="tablist" aria-label="Opciones de acceso">
      <button
        type="button"
        role="tab"
        [class.active]="mode() === 'login'"
        [attr.aria-selected]="mode() === 'login'"
        (click)="setMode('login')"
      >
        Iniciar sesión
      </button>
      <button
        type="button"
        role="tab"
        [class.active]="mode() === 'change-password'"
        [attr.aria-selected]="mode() === 'change-password'"
        (click)="setMode('change-password')"
      >
        Cambiar contraseña
      </button>
    </div>

    @if (mode() === 'login') {
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="tuemail@ejemplo.com"
          required
        />

        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="••••••••"
          required
        />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    } @else {
      <form (ngSubmit)="onChangePasswordSubmit()" class="auth-form">
        <label for="change-email">Correo electrónico</label>
        <input
          id="change-email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="change-email"
          placeholder="tuemail@ejemplo.com"
          required
        />

        <label for="current-password">Contraseña actual</label>
        <input
          id="current-password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="current-password"
          placeholder="Contraseña temporal o actual"
          required
        />

        <label for="new-password">Nueva contraseña</label>
        <input
          id="new-password"
          type="password"
          [ngModel]="newPassword()"
          (ngModelChange)="newPassword.set($event)"
          name="new-password"
          placeholder="Mínimo 8 caracteres"
          required
        />

        <label for="confirm-password">Confirmar nueva contraseña</label>
        <input
          id="confirm-password"
          type="password"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          name="confirm-password"
          placeholder="Repite la nueva contraseña"
          required
        />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Guardando...' : 'Guardar contraseña' }}
        </button>
      </form>
    }
  </div>
</div>
